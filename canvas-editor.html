<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canvas Editor</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f4f4f2; height: 100vh; display: flex; flex-direction: column; }
  #app { display: flex; flex-direction: column; height: 100vh; }
  #toolbar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #fff; border-bottom: 1px solid #e0ddd6; flex-wrap: wrap; }
  .tool-btn { padding: 6px 13px; font-size: 13px; font-family: inherit; background: transparent; border: 1px solid #d0cec6; border-radius: 8px; cursor: pointer; color: #1a1a1a; white-space: nowrap; }
  .tool-btn:hover { background: #f4f4f2; }
  .sep { width: 1px; height: 24px; background: #e0ddd6; margin: 0 4px; }
  #font-size { width: 58px; }
  #canvas-wrap { flex: 1; overflow: auto; display: flex; align-items: flex-start; justify-content: flex-start; padding: 24px; }
  #canvas { position: relative; width: 900px; min-height: 580px; background: #fff; border: 1px solid #d0cec6; box-shadow: 0 2px 8px rgba(0,0,0,0.08); overflow: hidden; flex-shrink: 0; }
  .c-el { position: absolute; user-select: none; cursor: move; }
  .c-el.selected { outline: 2px solid #378ADD; outline-offset: 2px; }
  .c-el img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }
  .c-el video { width: 100%; height: 100%; display: block; }
  .txt-inner { width: 100%; height: 100%; overflow: hidden; word-break: break-word; white-space: pre-wrap; outline: none; }
  .resize-handle { position: absolute; width: 11px; height: 11px; background: #fff; border: 2px solid #378ADD; border-radius: 2px; right: -6px; bottom: -6px; cursor: se-resize; z-index: 10; display: none; }
  .delete-btn { position: absolute; top: -11px; right: -11px; width: 22px; height: 22px; background: #E24B4A; color: #fff; border-radius: 50%; font-size: 15px; display: none; align-items: center; justify-content: center; cursor: pointer; z-index: 10; line-height: 1; }
  #drop-hint { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: #b0ada6; pointer-events: none; }
  #drop-hint p { font-size: 15px; }
  #drop-hint small { font-size: 13px; }
  #canvas.drag-over { outline: 2.5px dashed #378ADD; outline-offset: -4px; }
  #color-pick { width: 34px; height: 34px; padding: 2px; border: 1px solid #d0cec6; border-radius: 8px; cursor: pointer; }
  label.tool-btn { cursor: pointer; }
  #statusbar { font-size: 12px; color: #888; margin-left: auto; }
  #statusbar.err { color: #c0392b; font-weight: 500; }
  #toolbar h1 { font-size: 15px; font-weight: 600; color: #1a1a1a; margin-right: 4px; }
  #canvas-size-inputs { display: flex; align-items: center; gap: 5px; font-size: 13px; color: #555; }
  #canvas-size-inputs input[type=number] { width: 62px; padding: 5px 7px; font-size: 13px; font-family: inherit; border: 1px solid #d0cec6; border-radius: 8px; text-align: center; }
  #canvas-size-inputs input[type=number]:focus { outline: none; border-color: #378ADD; }
  .size-preset { padding: 5px 10px; font-size: 12px; }
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <h1>Canvas Editor</h1>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-text">+ Text</button>
    <label class="tool-btn" for="media-input">+ Image / Video</label>
    <input type="file" id="media-input" accept="image/*,video/*" style="display:none" multiple>
    <div class="sep"></div>
    <input type="color" id="color-pick" value="#1a1a1a" title="Text color">
    <select id="font-size" class="tool-btn">
      <option>12</option><option>14</option><option selected>18</option><option>24</option><option>32</option><option>48</option><option>64</option>
    </select>
    <button class="tool-btn" id="btn-bold"><b>B</b></button>
    <button class="tool-btn" id="btn-italic"><i>I</i></button>
    <div class="sep"></div>
    <div class="sep"></div>
    <div id="canvas-size-inputs">
      <select id="size-preset" class="tool-btn size-preset" title="Canvas presets">
        <option value="">Custom</option>
        <option value="900,580">900×580</option>
        <option value="1920,1080">1920×1080 (HD)</option>
        <option value="1280,720">1280×720 (720p)</option>
        <option value="1080,1080">1080×1080 (Square)</option>
        <option value="1080,1920">1080×1920 (Portrait)</option>
        <option value="794,1123">A4 Portrait</option>
        <option value="1123,794">A4 Landscape</option>
      </select>
      <input type="number" id="canvas-w" value="900" min="100" max="4000" title="Width (px)">
      <span>×</span>
      <input type="number" id="canvas-h" value="580" min="100" max="4000" title="Height (px)">
      <button class="tool-btn" id="btn-apply-size">Apply</button>
    </div>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-clear">Clear all</button>
    <button class="tool-btn" id="btn-save">&#8595; Save as HTML</button>
    <button class="tool-btn" id="btn-export">&#8595; Export PDF</button>
    <span id="statusbar"></span>
  </div>
  <div id="canvas-wrap">
    <div id="canvas">
      <div id="drop-hint">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none">
          <rect x="6" y="6" width="36" height="36" rx="5" stroke="#b0ada6" stroke-width="1.5" stroke-dasharray="5 3"/>
          <path d="M16 24h16M24 16v16" stroke="#b0ada6" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p>Drop images or videos here</p>
        <small>Supports JPG, PNG, GIF, WebP and video</small>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  var canvas   = document.getElementById('canvas');
  var hint     = document.getElementById('drop-hint');
  var statusEl = document.getElementById('statusbar');
  var selected = null;
  var dragEl = null, dragOffX = 0, dragOffY = 0;
  var resizing = false, resizeEl = null;
  var rsX, rsY, rsW, rsH;

  function setStatus(msg, isErr, duration) {
    statusEl.textContent = msg;
    statusEl.className = isErr ? 'err' : '';
    if (duration) setTimeout(function () { statusEl.textContent = ''; statusEl.className = ''; }, duration);
  }

  function updateHint() {
    hint.style.display = canvas.querySelectorAll('.c-el').length === 0 ? 'flex' : 'none';
  }

  function selectEl(el) {
    if (selected && selected !== el) deselectAll();
    selected = el;
    el.classList.add('selected');
    el.querySelector('.delete-btn').style.display = 'flex';
    el.querySelector('.resize-handle').style.display = 'block';
  }

  function deselectAll() {
    if (!selected) return;
    selected.classList.remove('selected');
    selected.querySelector('.delete-btn').style.display = 'none';
    selected.querySelector('.resize-handle').style.display = 'none';
    selected = null;
  }

  function makeEl(type, opts) {
    opts = opts || {};
    var el = document.createElement('div');
    el.className = 'c-el';
    el.style.left  = (opts.x || 60) + 'px';
    el.style.top   = (opts.y || 60) + 'px';
    el.style.width = (opts.w || 260) + 'px';
    el.dataset.type = type;
    if (type === 'text') { el.style.height = 'auto'; el.style.minHeight = '44px'; }
    else { el.style.height = (opts.h || 200) + 'px'; }

    var del = document.createElement('div');
    del.className = 'delete-btn';
    del.textContent = '\u00d7';
    del.addEventListener('click', function (e) { e.stopPropagation(); el.remove(); updateHint(); });
    el.appendChild(del);

    var rz = document.createElement('div');
    rz.className = 'resize-handle';
    rz.addEventListener('mousedown', function (e) {
      e.preventDefault(); e.stopPropagation();
      resizing = true; resizeEl = el;
      rsX = e.clientX; rsY = e.clientY;
      rsW = parseFloat(el.style.width);
      rsH = parseFloat(el.style.height) || el.offsetHeight;
    });
    el.appendChild(rz);

    if (type === 'text') {
      var inner = document.createElement('div');
      inner.className = 'txt-inner';
      inner.contentEditable = 'true';
      inner.style.fontSize   = (opts.fontSize || 18) + 'px';
      inner.style.color      = opts.color || '#1a1a1a';
      inner.style.fontWeight = '400';
      inner.style.fontStyle  = 'normal';
      inner.style.fontFamily = 'Georgia, serif';
      inner.textContent = 'Type here...';
      inner.addEventListener('mousedown', function (e) { e.stopPropagation(); });
      inner.addEventListener('focus', function () {
        selectEl(el);
        if (inner.textContent === 'Type here...') inner.textContent = '';
      });
      el.appendChild(inner);
    } else if (type === 'image') {
      var img = document.createElement('img');
      img.src = opts.src;
      el.appendChild(img);
    } else if (type === 'video') {
      var vid = document.createElement('video');
      vid.src = opts.src;
      vid.controls = true;
      el.appendChild(vid);
    }

    el.addEventListener('mousedown', function (e) {
      if (e.target.classList.contains('resize-handle') || e.target.classList.contains('delete-btn')) return;
      if (e.target.classList.contains('txt-inner')) { selectEl(el); return; }
      e.preventDefault();
      selectEl(el);
      dragEl = el;
      var r = canvas.getBoundingClientRect();
      dragOffX = e.clientX - r.left - parseFloat(el.style.left);
      dragOffY = e.clientY - r.top  - parseFloat(el.style.top);
    });

    canvas.appendChild(el);
    updateHint();
    return el;
  }

  document.addEventListener('mousemove', function (e) {
    if (dragEl) {
      var r = canvas.getBoundingClientRect();
      var x = Math.max(0, Math.min(canvas.offsetWidth - dragEl.offsetWidth, e.clientX - r.left - dragOffX));
      var y = Math.max(0, e.clientY - r.top - dragOffY);
      dragEl.style.left = x + 'px'; dragEl.style.top = y + 'px';
    }
    if (resizing && resizeEl) {
      resizeEl.style.width = Math.max(60, rsW + (e.clientX - rsX)) + 'px';
      if (resizeEl.dataset.type !== 'text')
        resizeEl.style.height = Math.max(40, rsH + (e.clientY - rsY)) + 'px';
    }
  });
  document.addEventListener('mouseup', function () { dragEl = null; resizing = false; resizeEl = null; });
  canvas.addEventListener('click', function (e) { if (e.target === canvas || e.target === hint) deselectAll(); });

  /* ── Toolbar ── */
  document.getElementById('btn-text').addEventListener('click', function () {
    var el = makeEl('text', {
      x: 80 + Math.random() * 200, y: 80 + Math.random() * 200,
      fontSize: parseInt(document.getElementById('font-size').value),
      color: document.getElementById('color-pick').value
    });
    selectEl(el);
    setTimeout(function () { el.querySelector('.txt-inner').focus(); }, 50);
  });
  document.getElementById('btn-bold').addEventListener('click', function () {
    if (selected && selected.dataset.type === 'text') {
      var i = selected.querySelector('.txt-inner');
      i.style.fontWeight = i.style.fontWeight === '700' ? '400' : '700';
    }
  });
  document.getElementById('btn-italic').addEventListener('click', function () {
    if (selected && selected.dataset.type === 'text') {
      var i = selected.querySelector('.txt-inner');
      i.style.fontStyle = i.style.fontStyle === 'italic' ? 'normal' : 'italic';
    }
  });
  document.getElementById('color-pick').addEventListener('input', function (e) {
    if (selected && selected.dataset.type === 'text')
      selected.querySelector('.txt-inner').style.color = e.target.value;
  });
  document.getElementById('font-size').addEventListener('change', function (e) {
    if (selected && selected.dataset.type === 'text')
      selected.querySelector('.txt-inner').style.fontSize = e.target.value + 'px';
  });
  document.getElementById('btn-clear').addEventListener('click', function () {
    canvas.querySelectorAll('.c-el').forEach(function (el) { el.remove(); });
    updateHint();
  });

  /* ── File loading ── */
  function readAsDataURL(blob) {
    return new Promise(function (resolve, reject) {
      var r = new FileReader();
      r.onload  = function (e) { resolve(e.target.result); };
      r.onerror = function ()  { reject(new Error('FileReader failed')); };
      r.readAsDataURL(blob);
    });
  }

  function loadFile(file, opts) {
    var type = file.type.startsWith('video') ? 'video' : 'image';
    readAsDataURL(file)
      .then(function (src) { makeEl(type, Object.assign({}, opts, { src: src })); })
      .catch(function (err) { setStatus('Load failed: ' + err.message, true, 5000); });
  }

  function handleFiles(files) {
    var x = 40, y = 40;
    Array.prototype.forEach.call(files, function (file) {
      loadFile(file, { x: x + Math.random() * 80, y: y + Math.random() * 60, w: 280, h: 200 });
      x += 20; y += 20;
    });
  }

  document.getElementById('media-input').addEventListener('change', function (e) {
    handleFiles(e.target.files); e.target.value = '';
  });
  canvas.addEventListener('dragover',  function (e) { e.preventDefault(); canvas.classList.add('drag-over'); });
  canvas.addEventListener('dragleave', function ()  { canvas.classList.remove('drag-over'); });
  canvas.addEventListener('drop', function (e) {
    e.preventDefault(); canvas.classList.remove('drag-over'); handleFiles(e.dataTransfer.files);
  });

  /* ── Canvas Size ── */
  var canvasWInput = document.getElementById('canvas-w');
  var canvasHInput = document.getElementById('canvas-h');
  var sizePreset   = document.getElementById('size-preset');

  function applyCanvasSize(w, h) {
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    canvas.style.minHeight = 'unset';
    canvasWInput.value = w;
    canvasHInput.value = h;
  }

  sizePreset.addEventListener('change', function () {
    if (!sizePreset.value) return;
    var parts = sizePreset.value.split(',');
    applyCanvasSize(parseInt(parts[0]), parseInt(parts[1]));
  });

  canvasWInput.addEventListener('input', function () { sizePreset.value = ''; });
  canvasHInput.addEventListener('input', function () { sizePreset.value = ''; });

  document.getElementById('btn-apply-size').addEventListener('click', function () {
    var w = Math.max(100, Math.min(4000, parseInt(canvasWInput.value) || 900));
    var h = Math.max(100, Math.min(4000, parseInt(canvasHInput.value) || 580));
    applyCanvasSize(w, h);
    setStatus('Canvas resized to ' + w + '×' + h, false, 2500);
  });

  /* allow Enter key in size inputs */
  canvasWInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('btn-apply-size').click(); });
  canvasHInput.addEventListener('keydown', function (e) { if (e.key === 'Enter') document.getElementById('btn-apply-size').click(); });

  /* ── Save As HTML ── */
  document.getElementById('btn-save').addEventListener('click', function () {
    deselectAll();

    var els = canvas.querySelectorAll('.c-el');
    var elHTML = '';
    els.forEach(function (el) {
      var type = el.dataset.type;
      var style = 'position:absolute;left:' + el.style.left + ';top:' + el.style.top +
                  ';width:' + el.style.width + ';' +
                  (el.style.height && el.style.height !== 'auto' ? 'height:' + el.style.height + ';' : '') +
                  (el.style.minHeight ? 'min-height:' + el.style.minHeight + ';' : '');
      if (type === 'image') {
        var img = el.querySelector('img');
        elHTML += '<img src="' + img.src + '" style="' + style + 'object-fit:contain;">\n';
      } else if (type === 'video') {
        var vid = el.querySelector('video');
        elHTML += '<video src="' + vid.src + '" controls style="' + style + '"></video>\n';
      } else if (type === 'text') {
        var inner = el.querySelector('.txt-inner');
        var ts = 'font-size:' + inner.style.fontSize + ';color:' + inner.style.color +
                 ';font-weight:' + inner.style.fontWeight + ';font-style:' + inner.style.fontStyle +
                 ';font-family:' + inner.style.fontFamily + ';word-break:break-word;white-space:pre-wrap;';
        elHTML += '<div style="' + style + ts + '">' + inner.innerHTML + '</div>\n';
      }
    });

    var cw = canvas.offsetWidth, ch = canvas.offsetHeight;
    var html = '<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8">\n' +
      '<meta name="viewport" content="width=device-width,initial-scale=1">\n' +
      '<title>Canvas Export</title>\n<style>\n' +
      'body{margin:0;background:#f4f4f2;display:flex;align-items:flex-start;justify-content:flex-start;padding:24px;}\n' +
      '#canvas{position:relative;width:' + cw + 'px;height:' + ch + 'px;background:#fff;' +
      'border:1px solid #d0cec6;box-shadow:0 2px 8px rgba(0,0,0,0.08);overflow:hidden;}\n' +
      '</style>\n</head>\n<body>\n<div id="canvas">\n' + elHTML + '</div>\n</body>\n</html>';

    var blob = new Blob([html], { type: 'text/html' });
    var url  = URL.createObjectURL(blob);
    var a    = document.createElement('a');
    a.href = url; a.download = 'canvas-export.html';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    setStatus('HTML saved!', false, 3000);
  });

  /* ── PDF Export ── */
  document.getElementById('btn-export').addEventListener('click', function () {
    deselectAll();
    setStatus('Generating PDF\u2026');
    setTimeout(function () {
      html2canvas(canvas, { backgroundColor: '#ffffff', scale: 2, useCORS: true })
        .then(function (cvs) {
          var imgData = cvs.toDataURL('image/png');
          var pdf = new window.jspdf.jsPDF({
            orientation: 'landscape', unit: 'px',
            format: [canvas.offsetWidth, canvas.offsetHeight]
          });
          pdf.addImage(imgData, 'PNG', 0, 0, canvas.offsetWidth, canvas.offsetHeight);
          pdf.save('canvas-export.pdf');
          setStatus('PDF saved!', false, 3000);
        })
        .catch(function (err) { setStatus('Export failed: ' + err.message, true, 5000); });
    }, 120);
  });

})();
</script>
</body>
</html>
